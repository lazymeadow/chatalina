ktor {
    deployment {
        port = 6969
        port = ${?PORT}
    }
    application {
        modules = [ net.chatalina.ChatKt.module ]
    }
    hostname = ${?HOSTNAME}
    is_secure = ${?SECURE_CLIENT}
    env = ${ENV}
    static_files = web-client/dist
    static_files = ${?STATIC_FILE_PATH}
}

bec {
    site_name = Chat
    site_name = ${?SITE_NAME}
    secret_key = ${SECRET_KEY}
    history_limit_override = ${?HISTORY_LIMIT}

    encryption {
        key_path = ./keys
        key_path = ${?KEY_PATH}
    }

    image_cache {
        endpoint = ${IMAGE_CACHE_ENDPOINT}
        region = ${IMAGE_CACHE_REGION}
        bucket = ${IMAGE_CACHE_BUCKET}
        host = ${IMAGE_CACHE_HOST}
        access_key = ${IMAGE_CACHE_ACCESS_KEY}
        secret = ${IMAGE_CACHE_SECRET}
    }

    github {
        user = ${GITHUB_USER}
        token = ${GITHUB_TOKEN}
        repo = ${GITHUB_REPO}
    }

    email {
        from_address = ${FROM_ADDRESS}
        email_api = ${EMAIL_API}
        email_user = ${?EMAIL_USER}
        email_pass = ${?EMAIL_PASS}
    }

    gorillagroove {
        host = ${?GG_HOST}
    }
}

db {
    url = ${PG_URL}
    user = ${PG_USER}
    password = ${PG_PASS}
}

jwt {
    issuer = ${JWT_ISS}
    audience = ${JWT_AUD}
    client = ${JWT_CLIENT}
    jwks = ${JWT_JWKS}
    realm = ${JWT_REALM}
}
